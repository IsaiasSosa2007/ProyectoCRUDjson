<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./CSS/estilos.CSS" />
    <title>CRUD</title>
  </head>
  <body>
    <div class="contenedor">
      <header>
        <div class="divLogo">
          <img src="Gemini_Generated_Image_bings9bings9bing.png" alt="" />
        </div>
        <h1>Agencia de transporte</h1>
      </header>
      <nav>
        <div><a href="#section">Inicio</a></div>
        <div><a href="">Pasajero</a></div>
        <div><a href="">Empleado</a></div>
        <div><a href="">Boleto</a></div>
      </nav>
    </div>
    <br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br /><br />
    <div class="contenedor2">
      <h2>Datos del Cliente</h2>
      <!--*******************************************************************************************************-->
      <!--//***********DATOS DEL CLIENTE***********//-->
      <form action="">
        <label for="clienteInDni">DNI</label>
        <input type="text" id="clienteInDni" />

        <label for="clienteInNombre">Nombre/s</label>
        <input type="text" id="clienteInNombre" />

        <label for="clienteInApellido">Apellido/s</label>
        <input type="text" id="clienteInApellido" />

        <label for="clienteInDireccion">Direccion</label>
        <input type="text" id="clienteInDireccion" />

        <label for="clienteInRS">Razon Social</label>
        <input type="text" id="clienteInRS" />

        <label for="clienteInRuc">RUC</label>
        <input type="text" id="clienteInRuc" />
      </form>
      <button id="btnIngresarDatosCliente">INGRESAR</button>

      <!--*******************************************************************************************************-->
      <!--//**********DATOS DEL VIAJE************//-->
      <form action="">
        <label for="inDestino">Seleccione el destino</label>
        <input list="listaDestinos" type="text" id="inDestino" />

        <label for="inFechaMes">Mes de viaje</label>
        <input
          list="listaFechaMes"
          type="number"
          id="inFechaMes"
          min="0"
          max="11"
        />

        <label for="inFechaDia">Dia de viaje</label>
        <input
          type="number"
          placeholder="Ingrese el dia en numeros"
          id="inFechaDia"
          min="1"
          max="28"
        />

        <label for="inHora">Hora de viaje</label>
        <input list="listaFechaHora" type="text" id="inHora" />
      </form>
      <button id="btnIngresarFechaViaje">INGRESAR</button>

      <!--*******************************************************************************************************-->
      <!--//***********DATOS DEL EMPLEADO***********//-->
      <form action="">
        <label for="empleadoInDni">DNI Empleado</label>
        <input type="text" id="empleadoInDni" />

        <label for="empleadoInNombre">Nombre Empleado</label>
        <input type="text" id="empleadoInNombre" />

        <label for="empleadoInApellido">Apellido Empleado</label>
        <input type="text" id="empleadoInApellido" />
      </form>
      <button id="btnIngresarDatosEmpleado">INGRESAR</button>
      <!--
      [Número de boleto]
      [Fecha emisión]
      [Fecha viaje]
      [Hora viaje]
      [Asiento]
      [Origen]
      [Destino]
      [Valor]
      -->
      <datalist id="listaClientes"> </datalist>
      <datalist id="listaEmpleados"></datalist>
      <datalist id="listaDestinos">
        <option value="Mar del Plata">Mar del Plata</option>
        <option value="Tandil">Tandil</option>
        <option value="Córdoba">Córdoba</option>
        <option value="Bariloche">Bariloche</option>
        <option value="Salta">Salta</option>
        <option value="Mendoza">Mendoza</option>
      </datalist>
      <datalist id="listaFechaMes">
        <option value="0">Enero</option>
        <option value="1">Febrero</option>
        <option value="2">Marzo</option>
        <option value="3">Abril</option>
        <option value="4">Mayo</option>
        <option value="5">Junio</option>
        <option value="6">Julio</option>
        <option value="7">Agosto</option>
        <option value="8">Septiembre</option>
        <option value="9">Octubre</option>
        <option value="10">Noviembre</option>
        <option value="11">Diciembre</option>
      </datalist>
      <datalist id="listaFechaHora">
        <option value="10">09:00 hs (Mañana)</option>
        <option value="14">13:00 hs (Mediodía)</option>
        <option value="18">17:00 hs (Tarde)</option>
        <option value="22">21:00 hs (Noche)</option>
      </datalist>
      <section id="section"></section>
      <script src="./JS/script.JS"></script>
      <!-- <script src="./JS/funciones.js"></script> -->
    </div>
  </body>
</html>
